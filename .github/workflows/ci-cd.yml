name: PyPI Release

on:
  push:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Bump MINOR_VERSION and commit
  # Runs on any push to main, EXCEPT when the
  # push is already the version bump commit itself
  # ─────────────────────────────────────────────
  bump_version:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Skip if this push was already a bump commit (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'Bump to')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump MINOR_VERSION
        run: python bump_version.py

      - name: Push bumped version
        run: git push

  # ─────────────────────────────────────────────
  # JOB 2 — Build and publish to PyPI
  # Runs only after bump_version succeeds, and
  # only when triggered by a bump commit
  # ─────────────────────────────────────────────
  publish_pypi:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    needs: bump_version
    environment:
      name: pypi
      url: https://pypi.org/project/z4d-certified-devices/
    permissions:
      id-token: write   # Required for secure publishing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the bump commit just pushed by the previous job
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine build

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}