name: Claude Issue Triage

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    if: github.event.label.name == 'ai-triage'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true

          prompt: |
            You are triaging a Zigbee device issue for z4d-certified-devices, a repo of
            per-manufacturer device config files in z4d_certified_devices/Certified/<Manufacturer>/.

            Budget: at most 3 tool calls (grep/glob/read). Do NOT explore broadly or read Python.

            Steps:
            1. From the title/body, extract the device Manufacturer name and Model.
            2. Grep the Certified/ tree for that model to see if a config already exists.
            3. Post ONE concise comment (max ~120 words, markdown) with:
             - **Type:** new-device-request | pairing-issue | wrong-behaviour | question
             - **Device:** manufacturer / model (or "not specified")
             - **Config found:** path to the JSON, or "none found"
             - **Next step:** the single most useful action, OR the exact missing info
               to request (e.g. the device's `Model`, `ManufacturerName`, and plugin
               "certification" log).
            Do not propose code changes. If real analysis is needed, say so and stop.
            - Title: ${{ github.event.issue.title }}
            - Issue #: ${{ github.event.issue.number }}
          claude_args: |
            --max-turns 6
            --model claude-haiku-4-5-20251001
